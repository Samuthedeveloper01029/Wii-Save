name: Automatic Wii DOL Editor

on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Make the DOL
        run: |
          export PATH=$DEVKITPPC/bin:$PATH
          powerpc-eabi-gcc -g -O2 -Wall -mrvl -mcpu=750 -meabi -mhard-float -I$DEVKITPRO/libogc/include -L$DEVKITPRO/libogc/lib/wii main.c -lfat -lwiiuse -logc -lm -o boot.elf
          elf2dol boot.elf boot.dol

      - name: Save the ready boot.dol file
        uses: actions/upload-artifact@v4
        with:
          name: Wii-Save_boot.dol
          path: boot.dol

